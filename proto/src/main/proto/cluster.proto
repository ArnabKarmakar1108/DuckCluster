syntax = "proto3";

package duckcluster.v1;

option java_multiple_files = true;
option java_package = "io.duckcluster.proto.v1";
option java_outer_classname = "ClusterProto";

// Called by workers on startup and for periodic liveness.
service CoordinatorService {
  rpc RegisterWorker(RegisterWorkerRequest) returns (RegisterWorkerResponse);
  rpc Heartbeat(stream HeartbeatRequest) returns (stream HeartbeatResponse);
  rpc UpdateShardOwnership(UpdateShardRequest) returns (UpdateShardResponse);
  rpc UpdateShardCache(UpdateShardCacheRequest) returns (UpdateShardCacheResponse);
}

// Called by the coordinator to reach worker nodes.
service WorkerService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc ExecuteFragment(FragmentRequest) returns (stream RowBatch);
  rpc ReadShard(ReadShardRequest) returns (stream ShardDataChunk);
  rpc ReceiveShard(stream ShardDataChunk) returns (ReceiveShardResponse);
  rpc LoadTempData(stream ShardDataChunk) returns (LoadTempDataResponse);
  rpc BeginShardPin(BeginShardPinRequest) returns (BeginShardPinResponse);
  rpc EndShardPin(EndShardPinRequest) returns (EndShardPinResponse);
  rpc MaterializeBroadcast(MaterializeBroadcastRequest) returns (MaterializeBroadcastResponse);
  rpc ClearBroadcastTables(ClearBroadcastTablesRequest) returns (ClearBroadcastTablesResponse);
}

message RegisterWorkerRequest {
  string worker_id = 1;
  string host = 2;
  int32 port = 3;
  int32 num_threads = 4;
  repeated ShardOwnership owned_shards = 5;
}

message ShardOwnership {
  string table_name = 1;
  uint32 shard_id = 2;
  uint64 row_count = 3;
}

message UpdateShardRequest {
  string worker_id = 1;
  repeated ShardOwnership owned_shards = 2;
}

message UpdateShardResponse {
  bool accepted = 1;
}

message RegisterWorkerResponse {
  bool accepted = 1;
  string message = 2;
}

message HeartbeatRequest {
  string worker_id = 1;
  double load = 2;
}

message HeartbeatResponse {
  bool healthy = 1;
}

message PingRequest {}

message PingResponse {
  bool ok = 1;
  string worker_id = 2;
}

enum MergeHint {
  MERGE_HINT_UNSPECIFIED = 0;
  CONCAT = 1;
  PARTIAL_AGG = 2;
  GROUP_BY = 3;
  TOP_K = 4;
}

message FragmentRequest {
  string query_id = 1;
  uint32 fragment_id = 2;
  string sql = 3;
  MergeHint merge_hint = 4;
  repeated string result_column_names = 5;
}

message RowBatch {
  uint64 row_count = 1;
  repeated string column_names = 2;
  repeated Column column_values = 3;
}

message Column {
  string name = 1;
  repeated string values = 2;
}

message ReadShardRequest {
  string table_name = 1;
  uint32 shard_id = 2;
}

message ShardDataChunk {
  string table_name = 1;
  uint32 shard_id = 2;
  bytes data = 3;
  bool is_last = 4;
}

message ReceiveShardResponse {
  bool accepted = 1;
  string message = 2;
}

message LoadTempDataResponse {
  bool accepted = 1;
  string catalog_name = 2;
}

message BeginShardPinRequest {}

message BeginShardPinResponse {
  bool accepted = 1;
}

message EndShardPinRequest {}

message EndShardPinResponse {
  bool accepted = 1;
}

message MaterializeBroadcastRequest {
  string query_id = 1;
  string table_name = 2;
  uint32 shard_count = 3;
}

message MaterializeBroadcastResponse {
  bool accepted = 1;
  string temp_table_name = 2;
}

message ClearBroadcastTablesRequest {
  string query_id = 1;
}

message ClearBroadcastTablesResponse {
  bool accepted = 1;
}

message UpdateShardCacheRequest {
  string worker_id = 1;
  repeated ShardOwnership cached_shards = 2;
}

message UpdateShardCacheResponse {
  bool accepted = 1;
}
